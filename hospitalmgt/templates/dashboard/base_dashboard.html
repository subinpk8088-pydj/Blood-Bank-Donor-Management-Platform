{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}Dashboard{% endblock %}</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" />
    <style>
        /* Remove default margin and padding from body */
        body {
            margin: 0;
            padding: 0;
            overflow-x: hidden;
            transition: background-color 0.3s;
        }
        
        /* Wrapper takes full width and height */
        #wrapper {
            display: flex;
            width: 100%;
            align-items: stretch;
            min-height: 100vh;
        }
        
        #sidebar {
            min-width: 250px;
            max-width: 250px;
            height: 100vh;
            background: #0d6efd;
            color: #fff;
            transition: all 0.3s;
            position: fixed;
            top: 0;
            left: 0;
            z-index: 999;
        }
        
        #sidebar.active {
            margin-left: -250px;
        }
        
        #sidebar .sidebar-header {
            padding: 20px;
            background: #0b5ed7;
        }
        
        #sidebar ul.components {
            padding: 20px 0;
        }
        
        #sidebar ul li a {
            padding: 10px 15px;
            display: block;
            color: #fff;
            text-decoration: none;
            border-left: 3px solid transparent;
        }
        
        #sidebar ul li a:hover {
            background: rgba(255, 255, 255, 0.2);
            border-left: 3px solid #fff;
        }
        
        #sidebar ul li.active > a,
        #sidebar ul li a.active {
            background: rgba(255, 255, 255, 0.3);
            border-left: 3px solid #fff;
        }
        
        #content {
            width: 100%;
            min-height: 100vh;
            transition: all 0.3s;
            margin-left: 250px;
        }
        
        #content.active {
            margin-left: 0;
        }
        
        .overlay {
            display: none;
            position: fixed;
            width: 100vw;
            height: 100vh;
            background: rgba(0, 0, 0, 0.7);
            z-index: 998;
            opacity: 0;
            transition: all 0.5s ease-in-out;
            top: 0;
            left: 0;
        }
        
        .overlay.active {
            display: block;
            opacity: 1;
        }
        
        #dismiss {
            width: 35px;
            height: 35px;
            line-height: 35px;
            text-align: center;
            background: #0b5ed7;
            position: absolute;
            top: 10px;
            right: 10px;
            cursor: pointer;
            border-radius: 50%;
            display: none;
        }
        
        /* Top navbar with no gaps */
        .navbar {
            padding: 0.75rem 1rem;
            background: #0d6efd;
            border: none;
            border-radius: 0;
            margin-bottom: 0;
            width: 100%;
            box-shadow: 0 2px 5px rgba(0, 0, 0, 0.1);
        }
        
        .navbar-brand {
            font-weight: 700;
        }
        
        #sidebarCollapse {
            background: transparent;
            color: white;
            border: none;
            font-size: 1.5rem;
            display: none; /* Hide by default on desktop */
        }
        
        /* Responsive styles */
        @media (max-width: 768px) {
            #sidebar {
                margin-left: -250px;
            }
            #sidebar.active {
                margin-left: 0;
            }
            #content {
                margin-left: 0;
            }
            #content.active {
                margin-left: 0;
            }
            #dismiss {
                display: block;
            }
            #sidebarCollapse {
                display: block; /* Show on small screens */
            }
            #sidebarCollapse span {
                display: none;
            }
        }
    </style>
</head>
<body>
    <div id="wrapper">
        <!-- Sidebar -->
        <nav id="sidebar">
            <div id="dismiss">
                <i class="fas fa-arrow-left"></i>
            </div>
            
            <div class="sidebar-header">
                <h5>Blood Center </h5>
            </div>
            
            <ul class="list-unstyled components">
                {% block sidebar %}
                {% endblock %}
            </ul>
        </nav>

        <!-- Page Content -->
        <div id="content">
            <!-- Navbar -->
            <nav class="navbar navbar-expand-lg navbar-dark">
                <div class="container-fluid">
                    <button type="button" id="sidebarCollapse" class="btn">
                        <i class="fas fa-bars"></i>
                    </button>
                    <a class="navbar-brand ms-3" href="#">Blood Center Dashboard</a>
                    <div class="ms-auto d-flex align-items-center">
                        <span class="text-white me-3 d-none d-md-block">Welcome, {{ request.user.username }}</span>
                        <a href="{% url 'logout_view' %}" class="btn btn-outline-light btn-sm">Logout</a>
                    </div>
                </div>
            </nav>

            <!-- Main Content -->
            <div class="content-container">
                {% block content %}
                {% endblock %}
            </div>
        </div>
    </div>

    <div class="overlay"></div>

    <!-- Scripts -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
    <script>
        $(document).ready(function () {
            // Sidebar toggle for mobile and desktop
            $('#dismiss, .overlay').on('click', function () {
                $('#sidebar').removeClass('active');
                $('#content').removeClass('active');
                $('.overlay').removeClass('active');
            });

            $('#sidebarCollapse').on('click', function () {
                $('#sidebar').toggleClass('active');
                $('#content').toggleClass('active');
                $('.overlay').toggleClass('active');
                $('.collapse.in').toggleClass('in');
                $('a[aria-expanded=true]').attr('aria-expanded', 'false');
            });
            
            // Add active class to current page
            var path = window.location.pathname;
            $("#sidebar ul li a").each(function() {
                var href = $(this).attr('href');
                if (path.includes(href) && href !== "#") {
                    $(this).addClass('active');
                    $(this).parent().addClass('active');
                }
            });
        });
    </script>
</body>
</html>
